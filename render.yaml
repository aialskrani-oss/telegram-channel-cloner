services:
  - type: worker
    name: telegram-channel-cloner
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    disk:
      name: cloner-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: SOURCE_CHANNEL
        sync: false
      - key: DESTINATION_CHANNEL
        sync: false
      - key: BATCH_SIZE
        value: "50"
      - key: DELAY_BETWEEN_MESSAGES
        value: "0.5"
      - key: DELAY_BETWEEN_BATCHES
        value: "2.0"
      - key: MAX_RETRIES
        value: "5"
      - key: RETRY_DELAY
        value: "10.0"
      - key: DB_PATH
        value: "/data/cloner.db"
