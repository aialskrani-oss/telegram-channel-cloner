services:
  - type: web
    name: telegram-channel-cloner
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: SOURCE_CHANNEL
        sync: false
      - key: DESTINATION_CHANNEL
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: DB_PATH
        value: "/tmp/cloner.db"
